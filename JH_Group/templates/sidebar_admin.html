<aside class="ios-sidebar">
    <div class="ios-sidebar-header">
        <div class="ios-sidebar-logo">JH</div>
        <div class="ios-sidebar-brand">
            <h3>Admin Portal</h3>
            <span>{{ current_user.role_label }}</span>
        </div>
    </div>
    <nav class="ios-sidebar-nav">
        {% for link in sidebar_links %}
        <a class="ios-sidebar-link {% if request.path == link.url %}active{% endif %}" href="{{ link.url }}">
            <span>{{ link.label }}</span>
        </a>
        {% endfor %}
    </nav>
    <div style="margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border-light);">
        <div style="font-size: 12px; color: var(--text-tertiary);">
            <strong style="color: var(--text-primary);">{{ current_user.name }}</strong>
        </div>
    </div>
</aside>
